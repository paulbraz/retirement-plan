version: 1
formatters:
    simple:
        datefmt: "%m/%d/%Y %H%M%S"
        format: "%(asctime)s | %(levelname)s | %(name)s.%(funcName)s [%(lineno)d] | %(message)s"
handlers:
    console:
        class: logging.StreamHandler
        level: INFO
        formatter: simple
        stream: ext://sys.stdout
    file:
        class: logging.FileHandler
        level: INFO
        formatter: simple
        filename: ./job_create_yahoo_portfolios.log
        mode: w
loggers:
    my_logger:
        level: INFO
        handlers: [console, file]
        propagate: no
root:
    level: INFO
    handlers: [console, file]
